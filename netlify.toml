[build]
  publish = "."
  functions = "netlify/functions"

# Pretty client-facing quote URLs: /quote/<slug> renders the viewer page,
# which reads the slug from the path and fetches the quote via the API.
[[redirects]]
  from = "/quote/*"
  to = "/quote.html"
  status = 200

# Cache media for a day — fast repeat visits, but not "immutable" so replaced
# images (same filename) still propagate within 24h instead of being stuck.
[[headers]]
  for = "/Images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# CSS/JS share fixed filenames, so they must revalidate (via ETag) on each load
# — otherwise updates don't reach returning visitors until the cache expires.
# Do NOT long-cache these unless the filenames become content-hashed.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
